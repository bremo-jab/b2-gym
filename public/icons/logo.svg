<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Neon Glow Filter -->
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%" filterUnits="userSpaceOnUse">
      <feGaussianBlur stdDeviation="12" result="blur1" />
      <feGaussianBlur stdDeviation="24" result="blur2" />
      <feMerge>
        <feMergeNode in="blur2" />
        <feMergeNode in="blur1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <!-- Dark Background Gradient -->
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#1F2833" />
      <stop offset="100%" stop-color="#0B0C10" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bg-grad)" />
  <rect width="500" height="500" x="6" y="6" rx="94" stroke="#ADFF2F" stroke-width="4" stroke-opacity="0.3" />

  <!-- Dumbbell & B2 Icon Group with Glow -->
  <g filter="url(#neon-glow)">
    <!-- Dumbbell Bar -->
    <rect x="156" y="246" width="200" height="20" rx="10" fill="#ADFF2F" />
    
    <!-- Dumbbell Weights Left -->
    <rect x="136" y="196" width="20" height="120" rx="6" fill="#ADFF2F" />
    <rect x="106" y="176" width="30" height="160" rx="8" fill="#66FCF1" />
    
    <!-- Dumbbell Weights Right -->
    <rect x="356" y="196" width="20" height="120" rx="6" fill="#ADFF2F" />
    <rect x="376" y="176" width="30" height="160" rx="8" fill="#66FCF1" />

    <!-- Stylized "B" and "2" text in the center -->
    <text x="256" y="150" font-family="'Cairo', sans-serif" font-weight="900" font-size="110" fill="#ADFF2F" text-anchor="middle">B2</text>
    
    <!-- Dynamic Glowing Arc -->
    <path d="M 120 380 A 180 180 0 0 0 392 380" stroke="#ADFF2F" stroke-width="12" stroke-linecap="round" />
  </g>
</svg>
